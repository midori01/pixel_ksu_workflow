name: Module - Build Scene Hider eBPF

on:
  workflow_call:
    inputs:
      kernel_version:
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Install Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends git clang llvm libelf-dev zlib1g-dev make zstd zip unzip

      - name: Clone Repositories
        run: |
          git clone --recurse-submodules --depth=1 https://github.com/libbpf/bpftool.git /tmp/bpftool
          git clone --depth=1 https://github.com/Andrea-lyz/Scene-Port-Hider-by-eBPF.git ebpf

      - name: Build bpftool
        run: make -j$(nproc) -C /tmp/bpftool/src

      - name: Wait for Kernel Build
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          kv="${{ inputs.kernel_version }}"
          for i in $(seq 1 500); do
            jobs=$(gh run view ${{ github.run_id }} --repo ${{ github.repository }} --json jobs 2>/dev/null || echo '{"jobs":[]}')
            if [ -z "$jobs" ]; then
              echo "gh API empty, retry $i/500"
              sleep 3
              continue
            fi
            success=$(echo "$jobs" | jq -r '.jobs[] | select(.name | startswith("'"$kv"' ")) | select(.status=="completed" and .conclusion=="success") | .name' 2>/dev/null || true)
            if [ -n "$success" ]; then
              echo "$kv kernel build done"
              break
            fi
            failed=$(echo "$jobs" | jq -r '.jobs[] | select(.name | startswith("'"$kv"' ")) | select(.status=="completed" and .conclusion!="success" and .conclusion!="skipped") | .name' 2>/dev/null || true)
            total=$(echo "$jobs" | jq -r '.jobs[] | select(.name | startswith("'"$kv"' ")) | .name' 2>/dev/null || true)
            failed_n=$(echo "$failed" | sed '/^$/d' | wc -l)
            total_n=$(echo "$total" | sed '/^$/d' | wc -l)
            ok_n=$(echo "$success" | sed '/^$/d' | wc -l)
            if [ "$total_n" -gt 0 ] && [ "$failed_n" -eq "$total_n" ]; then
              echo "::error::All $kv builds failed"
              exit 1
            fi
            echo "Waiting $kv ($i/500) [ok=$ok_n fail=$failed_n total=$total_n]"
            sleep 3
          done
          if [ -z "$success" ]; then
            echo "::error::No $kv kernel build completed in 25min"
            exit 1
          fi

      - name: Download vmlinux
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          kv="${{ inputs.kernel_version }}"
          run_id=${{ github.run_id }}
          artifact_id=$(gh api "repos/${{ github.repository }}/actions/runs/${run_id}/artifacts" --jq '.artifacts[] | select(.name | startswith("vmlinux-'"$kv"'-")) | .id' | head -n 1)
          if [ -z "$artifact_id" ]; then
            echo "::error::No vmlinux for $kv"
            exit 1
          fi
          cd /tmp
          gh api "repos/${{ github.repository }}/actions/artifacts/${artifact_id}/zip" > vmlinux.zip
          unzip -qo vmlinux.zip -d vmlinux && rm vmlinux.zip

      - name: Build eBPF Module
        run: |
          zstd -d -f /tmp/vmlinux/*.zst -o /tmp/vmlinux_raw
          cd ebpf && mkdir -p src output
          /tmp/bpftool/src/bpftool btf dump file /tmp/vmlinux_raw format c > src/vmlinux.h
          sed -i 's|https://zlib.net/zlib-\([0-9.]*\)\.tar\.gz|https://udomain.dl.sourceforge.net/project/libpng/zlib/\1/zlib-\1.tar.gz|' build_deps_android.sh
          BPFTOOL=/tmp/bpftool/src/bpftool bash tools/build_from_btf.sh || true

      - name: Strip BTF Check and Repack
        run: |
          cd "$(mktemp -d)"
          unzip -q "$(find "$GITHUB_WORKSPACE" -maxdepth 2 -name '*.zip' | head -n 1)" -d .
          [ -f customize.sh ] && sed -i '/^# ── Kernel BTF fingerprint verification/,/^ui_print "- Kernel BTF matched"/d' customize.sh && sed -i '/^$/N;/^\n$/d' customize.sh
          zip -rq "$GITHUB_WORKSPACE/ebpf/output/ScenePortHider-eBPF-${{ inputs.kernel_version }}.zip" .

      - uses: actions/upload-artifact@v7
        if: success()
        with:
          name: ScenePortHider-eBPF-${{ inputs.kernel_version }}
          path: ebpf/output/*.zip

      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: ScenePortHider-eBPF-${{ inputs.kernel_version }}
          path: /dev/null
