name: Build and Release
run-name: ${{ inputs.kernel_version == 'all' && (inputs.ksu_variant == 'all' && 'All Kernels - All Variants' || format('All Kernels - {0}', inputs.ksu_variant)) || (inputs.ksu_variant == 'all' && format('Kernel {0} - All Variants', inputs.kernel_version) || format('Kernel {0} - {1}', inputs.kernel_version, inputs.ksu_variant)) }}

on:
  workflow_dispatch:
    inputs:
      source_mirror:
        description: 'Kernel Source'
        required: true
        default: 'midori'
        type: choice
        options:
          - midori
          - google
      kernel_version:
        description: 'Kernel Version'
        required: true
        default: 'all'
        type: choice
        options:
          - 'all'
          - '6.1'
          - '6.6'
          - '6.12'
      ksu_variant:
        description: 'KernelSU Variant'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - MidoriSU
          - MidoriXX
          - MidoriRE
      midorisu_branch:
        description: 'MidoriSU Source'
        required: true
        default: 'midori01/KernelSU:main'
        type: choice
        options:
          - 'midori01/KernelSU:main'
          - 'midori01/KernelSU:test'
      midorixx_branch:
        description: 'MidoriXX Source'
        required: true
        default: 'backslashxx/KernelSU:master'
        type: choice
        options:
          - 'MidoriKSU/KernelSU:main'
          - 'backslashxx/KernelSU:master'
          - 'backslashxx/KernelSU:staging'
      midorire_branch:
        description: 'MidoriRE Source'
        required: true
        default: 'ReSukiSU/ReSukiSU:main'
        type: choice
        options:
          - 'midori01/ReSukiSU:main'
          - 'midori01/ReSukiSU:test'
          - 'ReSukiSU/ReSukiSU:main'
      hook_mode:
        description: "Hook Mode"
        required: true
        default: 'manual (MidoriXX & MidoriRE)'
        type: choice
        options:
          - 'manual (MidoriXX & MidoriRE)'
          - 'hookless (MidoriXX 6.12 only)'
          - 'tracepoint (MidoriRE only)'
      use_ccache:
        description: 'Ccache Speedup'
        required: true
        default: true
        type: boolean
      use_droidspaces:
        description: 'Droidspaces & NTSync'
        required: true
        default: true
        type: boolean
      use_rekernel:
        description: 'ReKernel'
        required: true
        default: true
        type: boolean
      build_scene_hider:
        description: 'eBPF (Scene Hider)'
        required: true
        default: true
        type: boolean
      enable_susfs:
        description: 'SUSFS'
        required: true
        default: true
        type: boolean
      susfs_commit:
        description: 'SUSFS Commit Hash (Leave blank for latest)'
        required: false
        default: ''
        type: string
      kernel_localversion:
        description: 'Spoof Kernel Name'
        required: true
        default: '-gki-midori-build'
        type: string
      build_timestamp:
        description: 'Spoof Build Time'
        required: true
        default: 'Mon Feb 02 02:02:02 JST 2026'
        type: string
      build_user:
        description: 'Spoof Build User'
        required: true
        default: 'midori'
        type: string
      build_host:
        description: 'Spoof Build Host'
        required: true
        default: 'build-host'
        type: string
      build_epoch:
        description: 'SOURCE_DATE_EPOCH'
        required: true
        default: '1764155774'
        type: string
      release_type:
        description: 'Release Type'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - pre-release
          - no-release
      cleanup_tags:
        description: "Cleanup Old Releases"
        type: boolean
        required: true
        default: true

permissions:
  contents: write
  packages: write

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.config.outputs.release_tag }}
      build_matrix: ${{ steps.config.outputs.build_matrix }}
      metadata: ${{ steps.config.outputs.metadata }}
      kernel_versions: ${{ steps.config.outputs.kernel_versions }}
      hook_mode_val: ${{ steps.config.outputs.hook_mode_val }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - id: config
        name: Prepare build matrix and metadata
        run: |
          echo "release_tag=$(TZ='Asia/Tokyo' date +'%Y%m%d-%H%M')" >> $GITHUB_OUTPUT
          config_file=".github/config/kernel_versions.json"

          if [ "${{ inputs.kernel_version }}" = "all" ]; then
            kvs='["6.1","6.6","6.12"]'
          else
            kvs='["${{ inputs.kernel_version }}"]'
          fi
          echo "kernel_versions=$kvs" >> $GITHUB_OUTPUT

          rm -f /tmp/metadata.json
          echo "$kvs" | jq -r '.[]' > /tmp/kvs.txt

          matrix='{"include":[]}'
          variant="${{ inputs.ksu_variant }}"
          while read kv; do
            config=$(jq -c '.["'$kv'"]' "$config_file")
            android_version=$(echo "$config" | jq -r '.android_version')
            sub_level=$(echo "$config" | jq -r '.default_sub_level')
            revision=$(echo "$config" | jq -c '.revisions["'$sub_level'"]')
            asb_date=$(echo "$revision" | jq -r '.asb_date')
            r_version=$(echo "$revision" | jq -r '.default_r')
            r_suffix=$([ "$r_version" != "none" ] && echo "_$r_version" || echo '')
            clang_version=$(echo "$config" | jq -r '.default_clang')
            rust=$(echo "$config" | jq -r '.rust')
            [ "$rust" = "true" ] && rust_version=$(echo "$config" | jq -r '.default_rust') || rust_version=""
            mirror_tag=$(echo "$config" | jq -r '.mirror_tag')
            anykernel_branch=$(echo "$config" | jq -r '.anykernel_branch')
            google_ref=$([ "$r_version" = "none" ] && echo "heads" || echo "tags")
            if [ "${{ inputs.source_mirror }}" = "google" ]; then
              source_url="https://android.googlesource.com/kernel/common/+archive/refs/$google_ref"
              mirror_name="Google"
            else
              source_url="https://github.com/${{ github.repository }}/releases/download/$mirror_tag"
              mirror_name="GitHub"
            fi

            jq -n \
              --arg kv "$kv" \
              --arg android_version "$android_version" \
              --arg sub_level "$sub_level" \
              --arg asb_date "$asb_date" \
              --arg r_version "$r_version" \
              --arg r_suffix "$r_suffix" \
              --arg clang_version "$clang_version" \
              --arg rust_version "$rust_version" \
              --arg source_url "$source_url" \
              --arg mirror_name "$mirror_name" \
              --arg anykernel_branch "$anykernel_branch" \
              '{kernel_version:$kv,android_version:$android_version,sub_level:$sub_level,asb_date:$asb_date,r_version:$r_version,r_suffix:$r_suffix,clang_version:$clang_version,rust_version:$rust_version,source_base_url:$source_url,mirror_name:$mirror_name,anykernel_branch:$anykernel_branch}' >> /tmp/metadata.json

            add_variant() {
              local v=$1 has_susfs=$2
              local ds="false"
              local sus="false"
              [ "${{ inputs.use_droidspaces }}" = "true" ] && ds="true"
              [ "$has_susfs" = "true" ] && [ "${{ inputs.enable_susfs }}" = "true" ] && sus="true"
              matrix=$(echo "$matrix" | jq -c --arg kv "$kv" --arg variant "$v" --argjson ds "$ds" --argjson sus "$sus" '.include += [{"kernel_version":$kv,"variant":$variant,"droidspaces":$ds,"susfs":$sus}]')
            }

            [[ "$variant" =~ ^(all|MidoriSU)$ ]] && add_variant MidoriSU true
            [[ "$variant" =~ ^(all|MidoriXX)$ ]] && add_variant MidoriXX true
            [[ "$variant" =~ ^(all|MidoriRE)$ ]] && add_variant MidoriRE true
          done < /tmp/kvs.txt

          echo "metadata=$(jq -sc '.' /tmp/metadata.json)" >> $GITHUB_OUTPUT
          echo "build_matrix=$matrix" >> $GITHUB_OUTPUT

          case "${{ inputs.hook_mode }}" in
            'manual (MidoriXX & MidoriRE)') hook_mode_val="manual" ;;
            'hookless (MidoriXX 6.12 only)') hook_mode_val="hookless" ;;
            'tracepoint (MidoriRE only)') hook_mode_val="tracepoint" ;;
            *) hook_mode_val="manual" ;;
          esac
          echo "hook_mode_val=$hook_mode_val" >> $GITHUB_OUTPUT

  build:
    name: "${{ matrix.kernel_version }} - ${{ matrix.variant }}${{ matrix.susfs && (matrix.droidspaces && ' (SUSFS DS)' || ' (SUSFS)') || (matrix.droidspaces && ' (DS)' || '') }}"
    needs: setup
    if: needs.setup.outputs.build_matrix != '{"include":[]}'
    strategy:
      matrix: ${{ fromJson(needs.setup.outputs.build_matrix) }}
    uses: ./.github/workflows/build-kernel.yml
    with:
      kernel_version: ${{ matrix.kernel_version }}
      variant: ${{ matrix.variant }}
      use_droidspaces: ${{ matrix.droidspaces }}
      use_rekernel: ${{ inputs.use_rekernel }}
      use_susfs: ${{ matrix.susfs }}
      source_mirror: ${{ inputs.source_mirror }}
      use_ccache: ${{ inputs.use_ccache }}
      susfs_commit: ${{ inputs.susfs_commit }}
      build_ebpf: ${{ inputs.build_scene_hider }}
      kernel_localversion: ${{ inputs.kernel_localversion }}
      build_epoch: ${{ inputs.build_epoch }}
      build_timestamp: ${{ inputs.build_timestamp }}
      build_user: ${{ inputs.build_user }}
      build_host: ${{ inputs.build_host }}
      midorisu_branch: ${{ inputs.midorisu_branch }}
      midorixx_branch: ${{ inputs.midorixx_branch }}
      midorire_branch: ${{ inputs.midorire_branch }}
      hook_mode: ${{ needs.setup.outputs.hook_mode_val }}

  build_scene_hider:
    name: "eBPF ${{ matrix.kernel_version }}"
    needs: [setup]
    if: always() && inputs.build_scene_hider && needs.setup.result == 'success'
    strategy:
      matrix:
        kernel_version: ${{ fromJson(needs.setup.outputs.kernel_versions) }}
    uses: ./.github/workflows/build-ebpf.yml
    with:
      kernel_version: ${{ matrix.kernel_version }}

  release:
    needs: [setup, build, build_scene_hider]
    if: |
      always() &&
      inputs.release_type != 'no-release' &&
      needs.setup.result == 'success' &&
      needs.build.result == 'success' &&
      (needs.build_scene_hider.result == 'success' || needs.build_scene_hider.result == 'skipped')
    strategy:
      matrix:
        kv: ${{ fromJson(needs.setup.outputs.kernel_versions) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Load metadata for ${{ matrix.kv }}
        id: meta
        run: |
          echo '${{ needs.setup.outputs.metadata }}' | jq -r '.[] | select(.kernel_version=="${{ matrix.kv }}")' > /tmp/meta.json
          while IFS='=' read -r key value; do echo "$key=$value" >> $GITHUB_OUTPUT; done < <(jq -r 'to_entries[] | "\(.key)=\(.value)"' /tmp/meta.json)

      - uses: actions/download-artifact@v8
        with:
          pattern: 'commit-info-${{ matrix.kv }}-*'
          path: commit_info
          merge-multiple: true

      - uses: actions/download-artifact@v8
        with:
          pattern: 'Kernel-${{ matrix.kv }}-*'
          path: release_zips
          merge-multiple: true

      - uses: actions/download-artifact@v8
        if: inputs.build_scene_hider == true
        with:
          name: ScenePortHider-eBPF-${{ matrix.kv }}
          path: release_zips
        continue-on-error: true

      - name: Check eBPF artifact
        run: |
          ebpf=$(find ${{ github.workspace }}/release_zips -maxdepth 1 -name 'ScenePortHider-eBPF*.zip' 2>/dev/null | head -n 1)
          echo "EBPF_FILE=$(basename "$ebpf" 2>/dev/null)" >> $GITHUB_ENV

      - name: Download KSU Toolkit Module
        run: |
          toolkit=""
          url=$(curl -sL "https://nightly.link/backslashxx/ksu_toolkit/workflows/module/master?preview" | grep -oP 'https://nightly\.link/backslashxx/ksu_toolkit/workflows/module/master/ksu_toolkit-\d+\.zip' | head -n 1)
          if [ -n "$url" ]; then
            toolkit=$(basename "$url")
            curl --fail -L -o "${{ github.workspace }}/release_zips/${toolkit}" "$url" || toolkit=""
          fi
          echo "TOOLKIT_FILE=$toolkit" >> $GITHUB_ENV

      - name: Download SUSFS Module
        if: inputs.enable_susfs == true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download --repo sidex15/susfs4ksu-module --pattern "*.zip" --dir release_zips 2>/dev/null || true

      - name: Download MidoriSU Manager APK
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download --repo midori01/KernelSU --pattern "*.apk" --dir release_zips 2>/dev/null || true
          apk=$(ls release_zips/*.apk 2>/dev/null | head -n 1)
          echo "MIDORISU_APK=$(basename "$apk" 2>/dev/null)" >> $GITHUB_ENV
          echo "KSUD_VERSION=$(echo "$apk" | grep -oP '\d+(?=-release\.apk$)' || echo "unknown")" >> $GITHUB_ENV

      - name: Download MidoriRE Manager APK
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download --repo midori01/ReSukiSU --pattern "*.apk" --dir release_zips 2>/dev/null || true
          apk=$(ls release_zips/*.apk 2>/dev/null | head -n 1)
          echo "MIDORIRE_APK=$(basename "$apk" 2>/dev/null)" >> $GITHUB_ENV

      - name: Read Commit Info
        id: ksu_info
        run: |
          variant="${{ inputs.ksu_variant }}"
          short_sha() { cut -c1-7 "$1"; }
          out() { echo "$1" >> $GITHUB_OUTPUT; }
          ksu_line() {
            local tag=$1 repo=$2 file=$3
            [ -f "$file" ] && [[ "$variant" =~ ^(all|$tag)$ ]] || return 0
            out "${tag,,}=- **$tag**: [\`$(short_sha "$file")\`](https://github.com/$repo/commit/$(cat "$file")) \`$(cat "${file%_commit}_date")\`"
          }
          if [ -f "commit_info/susfs_commit" ]; then
            sha=$(cat commit_info/susfs_commit)
            out "susfs_commit=\`$(short_sha commit_info/susfs_commit)\`"
            out "susfs_url=https://gitlab.com/simonpunk/susfs4ksu/-/commit/$sha"
            out "susfs_date=\`$(cat commit_info/susfs_date)\`"
          fi
          if [ -f "commit_info/midorisu_ksu_commit" ] && [ -f "commit_info/ksu_commit_count" ]; then
            out "driver_version=$((30000 + $(cat commit_info/ksu_commit_count)))"
          fi
          ksu_line MidoriSU "$(cat commit_info/midorisu_ksu_repo 2>/dev/null)" commit_info/midorisu_ksu_commit
          ksu_line MidoriXX "$(cat commit_info/midorixx_ksu_repo 2>/dev/null)" commit_info/midorixx_ksu_commit
          ksu_line MidoriRE "$(cat commit_info/midorire_ksu_repo 2>/dev/null)" commit_info/midorire_ksu_commit

      - name: Publish Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: "${{ needs.setup.outputs.release_tag }}-${{ matrix.kv }}"
          name: "Midori Kernel ${{ matrix.kv }} (${{ needs.setup.outputs.release_tag }})"
          body: |
            - **Kernel Source**: [`${{ steps.meta.outputs.mirror_name }}`](${{ steps.meta.outputs.source_base_url }}/${{ steps.meta.outputs.android_version }}-${{ matrix.kv }}-${{ steps.meta.outputs.asb_date }}${{ steps.meta.outputs.r_suffix }}.tar.gz) `${{ steps.meta.outputs.android_version }}-${{ matrix.kv }}.${{ steps.meta.outputs.sub_level }}${{ steps.meta.outputs.r_suffix }}`
            ${{ steps.ksu_info.outputs.midorisu }}
            ${{ steps.ksu_info.outputs.midorixx }}
            ${{ steps.ksu_info.outputs.midorire }}
            ${{ steps.ksu_info.outputs.susfs_url && format('- **SUSFS**: [{0}]({1}) {2}', steps.ksu_info.outputs.susfs_commit, steps.ksu_info.outputs.susfs_url, steps.ksu_info.outputs.susfs_date) || '' }}
            - **KSU Driver**: `${{ steps.ksu_info.outputs.driver_version || env.KSUD_VERSION }}`　**KSUD Version**: `${{ env.KSUD_VERSION }}`
            - **Manager 1**: `${{ env.MIDORISU_APK }}`
            - **Manager 2**: `${{ env.MIDORIRE_APK }}`
            - **Kernel Name (Spoofed)**: `${{ matrix.kv }}.${{ steps.meta.outputs.sub_level }}${{ inputs.kernel_localversion }}`
            - **Build Time (Spoofed)**: `${{ inputs.build_timestamp }}`
            - **Builder (Spoofed)**: `${{ inputs.build_user }}@${{ inputs.build_host }}`
            - **Droidspaces**: ${{ inputs.use_droidspaces && '✅' || '❌' }}　**NTSync**: ${{ inputs.use_droidspaces && '✅' || '❌' }}　**ReKernel**: ${{ inputs.use_rekernel && '✅' || '❌' }}
            - **TMPFS**: ✅　**BBR**: ✅　**IPSET**: ✅　**Ccache**: ${{ inputs.use_ccache && '✅' || '❌' }}
            - **eBPF**: ${{ env.EBPF_FILE && format('✅ `({0})`', env.EBPF_FILE) || '❌' }}
            - **KSU Toolkit**: ${{ env.TOOLKIT_FILE && format('✅ `({0})`', env.TOOLKIT_FILE) || '❌' }}
            - **LLVM Clang**: `${{ steps.meta.outputs.clang_version }}`${{ steps.meta.outputs.rust_version && format('　**Rust**: `{0}`', steps.meta.outputs.rust_version) || '' }}
          files: |
            release_zips/*.zip
            release_zips/*.apk
          prerelease: ${{ inputs.release_type == 'pre-release' }}

  cleanup:
    needs: release
    if: success() || failure()
    uses: ./.github/workflows/cleanup-tags.yml
