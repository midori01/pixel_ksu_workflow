name: Build and Release

on:
  workflow_dispatch:
    inputs:
      source_mirror:
        description: 'Kernel Source'
        required: true
        default: 'midori'
        type: choice
        options:
          - google
          - midori
      sub_level:
        description: 'Kernel Sublevel'
        required: true
        default: '127'
        type: choice
        options:
          - '127'
      r_version:
        description: 'Kernel Revision'
        required: true
        default: 'r13'
        type: choice
        options:
          - none
          - r13
      ksu_variant:
        description: 'KernelSU Variant'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - MidoriSU
          - MidoriXX
      midorixx_branch:
        description: 'MidoriXX Source'
        required: true
        default: 'backslashxx/KernelSU:master'
        type: choice
        options:
          - 'MidoriKSU/KernelSU:main'
          - 'backslashxx/KernelSU:master'
          - 'backslashxx/KernelSU:staging'
      hook_mode:
        description: "MidoriXX Hook Mode"
        required: true
        default: "manual"
        type: choice
        options:
          - manual
          - hookless
      midorixx_tag:
        description: 'MidoriXX Tag'
        required: false
        default: ''
        type: string
      use_ccache:
        description: 'Ccache Speedup'
        required: true
        default: true
        type: boolean
      use_droidspaces:
        description: 'Droidspaces'
        required: true
        default: true
        type: boolean
      build_scene_hider:
        description: 'eBPF (Scene Hider)'
        required: true
        default: true
        type: boolean
      enable_susfs:
        description: 'SUSFS'
        required: true
        default: true
        type: boolean
      susfs_commit:
        description: 'SUSFS Commit (Leave blank for latest, only affects MidoriSU)'
        required: false
        default: ''
        type: string
      kernel_localversion:
        description: 'Spoof Kernel Name'
        required: true
        default: '-gki-droidspaces-midori-build'
        type: string
      build_timestamp:
        description: 'Spoof Build Time'
        required: true
        default: 'Tue Mar 03 03:03:03 JST 2026'
        type: string
      build_user:
        description: 'Spoof Build User'
        required: true
        default: 'midori'
        type: string
      build_host:
        description: 'Spoof Build Host'
        required: true
        default: 'build-host'
        type: string
      build_epoch:
        description: 'SOURCE_DATE_EPOCH'
        required: true
        default: '1771142583'
        type: string
      clang_version:
        description: 'Compiler Version'
        required: true
        default: 'clang-r510928'
        type: choice
        options:
          - clang-r510928
          - clang-r536225
          - clang-r547379
      release_type:
        description: 'Release Type'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - pre-release
          - no-release

permissions:
  contents: write
  packages: write

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.config.outputs.release_tag }}
      build_matrix: ${{ steps.config.outputs.build_matrix }}
      asb_date: ${{ steps.parse_config.outputs.asb_date }}
      r_version: ${{ steps.parse_config.outputs.r_version }}
      r_suffix: ${{ steps.config.outputs.r_suffix }}
      source_base_url: ${{ steps.config.outputs.source_base_url }}
      mirror_name: ${{ steps.config.outputs.mirror_name }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - id: config
        name: Prepare build matrix and metadata
        run: |
          echo "release_tag=build-$(date +'%y%m%d%H%M%S')" >> $GITHUB_OUTPUT
          echo "r_suffix=${{ inputs.r_version != 'none' && format('_{0}', inputs.r_version) || '' }}" >> $GITHUB_OUTPUT
          if [ "${{ inputs.source_mirror }}" == "google" ]; then
            echo "source_base_url=https://android.googlesource.com/kernel/common/+archive/refs/tags" >> $GITHUB_OUTPUT
            echo "mirror_name=Google" >> $GITHUB_OUTPUT
          else
            echo "source_base_url=https://github.com/MidoriKSU/dami-kernel-build/releases/download/1.0" >> $GITHUB_OUTPUT
            echo "mirror_name=GitHub" >> $GITHUB_OUTPUT
          fi

          add_variants() {
            local VARIANT=$1 HAS_SUSFS=$2
            local DS_LIST="false"
            [ "${{ inputs.use_droidspaces }}" == "true" ] && DS_LIST="false true"
            local SUS_LIST="false"
            [ "$HAS_SUSFS" == "true" ] && [ "${{ inputs.enable_susfs }}" == "true" ] && SUS_LIST="false true"
            for DS in $DS_LIST; do
              for SUS in $SUS_LIST; do
                MATRIX=$(echo "$MATRIX" | jq -c '.include += [{"variant":"'$VARIANT'","droidspaces":'$DS',"susfs":'$SUS'}]')
              done
            done
          }

          VARIANT="${{ inputs.ksu_variant }}"
          MATRIX='{"include":[]}'
          [[ "$VARIANT" =~ ^(all|MidoriSU)$ ]] && add_variants MidoriSU true
          [[ "$VARIANT" =~ ^(all|MidoriXX)$ ]] && add_variants MidoriXX false
          echo "build_matrix=$MATRIX" >> $GITHUB_OUTPUT

      - id: parse_config
        name: Validate and resolve kernel config
        run: |
          SUB_LEVEL="${{ inputs.sub_level }}"
          INPUT_R="${{ inputs.r_version }}"
          CONFIG_FILE=".github/config/kernel_versions.json"
          CONFIG=$(jq -c '.["'$SUB_LEVEL'"]' "$CONFIG_FILE")
          [ "$CONFIG" == "null" ] && { echo "::error::Sublevel $SUB_LEVEL is not defined in $CONFIG_FILE!"; exit 1; }
          ASB_DATE=$(echo "$CONFIG" | jq -r '.asb_date')
          DEFAULT_R=$(echo "$CONFIG" | jq -r '.default_r')
          SUPPORTED=$(echo "$CONFIG" | jq -r '.supported_r | index("'$INPUT_R'")')
          if [ "$SUPPORTED" != "null" ]; then
            FINAL_R="$INPUT_R"
          else
            echo "::warning::Revision '$INPUT_R' not supported for Sublevel $SUB_LEVEL. Fallback to '$DEFAULT_R'."
            FINAL_R="$DEFAULT_R"
          fi
          echo "asb_date=$ASB_DATE" >> $GITHUB_OUTPUT
          echo "r_version=$FINAL_R" >> $GITHUB_OUTPUT

  build:
    name: "${{ matrix.variant }} (DS: ${{ matrix.droidspaces }}${{ matrix.susfs && format(' SUSFS: {0}', matrix.susfs) || '' }})"
    needs: setup
    if: needs.setup.outputs.build_matrix != '{"include":[]}'
    strategy:
      matrix: ${{ fromJson(needs.setup.outputs.build_matrix) }}
    uses: ./.github/workflows/build-kernel.yml
    with:
      variant: ${{ matrix.variant }}
      source_mirror: ${{ inputs.source_mirror }}
      sub_level: ${{ inputs.sub_level }}
      asb_date: ${{ needs.setup.outputs.asb_date }}
      r_version: ${{ needs.setup.outputs.r_version }}
      use_ccache: ${{ inputs.use_ccache }}
      use_droidspaces: ${{ matrix.droidspaces }}
      use_susfs: ${{ matrix.susfs }}
      susfs_commit: ${{ inputs.susfs_commit }}
      build_ebpf: ${{ inputs.build_scene_hider }}
      kernel_localversion: ${{ inputs.kernel_localversion }}
      build_epoch: ${{ inputs.build_epoch }}
      build_timestamp: ${{ inputs.build_timestamp }}
      build_user: ${{ inputs.build_user }}
      build_host: ${{ inputs.build_host }}
      clang_version: ${{ inputs.clang_version }}
      midorixx_branch: ${{ inputs.midorixx_branch }}
      hook_mode: ${{ inputs.hook_mode }}
      midorixx_tag: ${{ inputs.midorixx_tag }}

  build_scene_hider:
    name: "Scene Port Hider (eBPF)"
    needs: [setup]
    if: always() && inputs.build_scene_hider && needs.setup.result == 'success'
    uses: ./.github/workflows/build-ebpf.yml

  release:
    needs: [setup, build, build_scene_hider]
    if: |
      always() &&
      inputs.release_type != 'no-release' &&
      needs.setup.result == 'success' &&
      needs.build.result == 'success' &&
      (needs.build_scene_hider.result == 'success' || needs.build_scene_hider.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          pattern: 'commit-info-*'
          path: commit_info
          merge-multiple: true

      - uses: actions/download-artifact@v8
        with:
          pattern: 'Kernel-*'
          path: release_zips
          merge-multiple: true

      - uses: actions/download-artifact@v8
        if: inputs.build_scene_hider == true
        with:
          name: ScenePortHider-eBPF
          path: release_zips
        continue-on-error: true

      - name: Check eBPF artifact
        id: check_ebpf
        run: |
          if ls release_zips/ScenePortHider-eBPF*.zip 2>/dev/null; then
            echo "ebpf_available=true" >> $GITHUB_OUTPUT
          else
            echo "ebpf_available=false" >> $GITHUB_OUTPUT
            echo "::warning::eBPF artifact not available, continuing without it"
          fi

      - name: Read Commit Info
        id: ksu_info
        run: |
          VARIANT="${{ inputs.ksu_variant }}"
          short_sha() { cut -c1-7 "$1"; }
          out() { echo "$1" >> $GITHUB_OUTPUT; }
          ksu_line() {
            local TAG=$1 REPO=$2 FILE=$3
            [ -f "$FILE" ] && [[ "$VARIANT" =~ ^(all|$TAG)$ ]] || return
            out "${TAG,,}=- **$TAG**: [\`$(short_sha "$FILE")\`](https://github.com/$REPO/commit/$(cat "$FILE")) \`$(cat "${FILE%_commit}_date")\`"
          }
          susfs_block() {
            local TAG=$1
            local CF="commit_info/${TAG}_susfs_commit"
            [ -f "$CF" ] || return
            SHA=$(cat "$CF")
            out "${TAG}_susfs_commit=\`$(short_sha "$CF")\`"
            out "${TAG}_susfs_url=https://gitlab.com/simonpunk/susfs4ksu/-/commit/$SHA"
            out "${TAG}_susfs_date=\`$(cat commit_info/${TAG}_susfs_date)\`"
          }
          ksu_line MidoriSU midori01/KernelSU commit_info/midorisu_ksu_commit && {
            out "driver_version=$((30000 + $(cat commit_info/ksu_commit_count)))"
            susfs_block midorisu
          }
          ksu_line MidoriXX "$(cat commit_info/midorixx_ksu_repo 2>/dev/null)" commit_info/midorixx_ksu_commit

      - name: Download MidoriSU Manager APK
        id: download_midorisu_apk
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download --repo midori01/KernelSU --pattern "*.apk" --dir release_zips 2>/dev/null || echo "::warning::Failed to download MidoriSU APK"
          APK=$(ls release_zips/*.apk 2>/dev/null | head -n 1)
          if [ -n "$APK" ]; then
            echo "midorisu_apk_filename=$(basename "$APK")" >> $GITHUB_OUTPUT
            echo "ksud_version=$(basename "$APK" | grep -oP '\d+(?=-release\.apk$)' || echo 'unknown')" >> $GITHUB_OUTPUT
          else
            echo "midorisu_apk_filename=NOT_FOUND" >> $GITHUB_OUTPUT
            echo "ksud_version=unknown" >> $GITHUB_OUTPUT
          fi

      - name: Download KSU Toolkit Module
        id: download_toolkit
        run: |
          echo "toolkit_filename=NOT_AVAILABLE" >> $GITHUB_OUTPUT
          PREVIEW_URL="https://nightly.link/backslashxx/ksu_toolkit/workflows/module/master?preview"
          DOWNLOAD_URL=$(curl -sL "$PREVIEW_URL" | grep -oP 'https://nightly\.link/backslashxx/ksu_toolkit/workflows/module/master/ksu_toolkit-\d+\.zip' | head -n 1)
          if [ -z "$DOWNLOAD_URL" ]; then
            echo "::warning::Failed to extract KSU Toolkit download link, skipping..."
            exit 0
          fi
          TOOLKIT_FILENAME=$(basename "$DOWNLOAD_URL")
          if curl --fail -L -o "release_zips/${TOOLKIT_FILENAME}" "$DOWNLOAD_URL"; then
            echo "toolkit_filename=$TOOLKIT_FILENAME" >> $GITHUB_OUTPUT
            echo "::notice::KSU Toolkit downloaded successfully: $TOOLKIT_FILENAME"
          else
            echo "::warning::Failed to download KSU Toolkit"
          fi

      - name: Download SUSFS Module
        if: inputs.enable_susfs == true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download --repo sidex15/susfs4ksu-module --pattern "*.zip" --dir release_zips 2>/dev/null || echo "::warning::Failed to download SUSFS module"
          ls release_zips/*.zip 2>/dev/null || echo "::warning::No zip files found in release_zips"

      - name: Publish Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: "${{ needs.setup.outputs.release_tag }}"
          name: "Midori Kernel (${{ needs.setup.outputs.release_tag }})"
          body: |
            - **Kernel Source**: [`${{ needs.setup.outputs.mirror_name }}`](${{ needs.setup.outputs.source_base_url }}/android15-6.6-${{ needs.setup.outputs.asb_date }}${{ needs.setup.outputs.r_suffix }}.tar.gz) `android15-6.6.${{ inputs.sub_level }}${{ needs.setup.outputs.r_suffix }}`
            ${{ steps.ksu_info.outputs.midorisu }}
            ${{ steps.ksu_info.outputs.midorixx }}
            ${{ steps.ksu_info.outputs.midorisu_susfs_url && format('- **SUSFS (MidoriSU)**: [{0}]({1}) {2}', steps.ksu_info.outputs.midorisu_susfs_commit, steps.ksu_info.outputs.midorisu_susfs_url, steps.ksu_info.outputs.midorisu_susfs_date) || '' }}
            - **KSU Driver**: `${{ steps.ksu_info.outputs.driver_version }}`　**KSUD Version**: `${{ steps.download_midorisu_apk.outputs.ksud_version }}`
            - **Manager**: `${{ steps.download_midorisu_apk.outputs.midorisu_apk_filename }}`
            - **Kernel Name (Spoofed)**: `6.6.${{ inputs.sub_level }}${{ inputs.kernel_localversion }}`
            - **Build Time (Spoofed)**: `${{ inputs.build_timestamp }}`
            - **Builder (Spoofed)**: `${{ inputs.build_user }}@${{ inputs.build_host }}`
            - **Docker**: ${{ inputs.use_droidspaces && '✅' || '❌' }}　**TMPFS**: ✅　**BBR**: ✅　**IPSET**: ✅
            - **eBPF (Scene Hider)**: ${{ steps.check_ebpf.outputs.ebpf_available == 'true' && '✅ `(ScenePortHider-eBPF.zip)`' || '❌ `(Build Failed)`' }}
            - **KSU Toolkit**: ${{ steps.download_toolkit.outputs.toolkit_filename != 'NOT_AVAILABLE' && format('✅ `({0})`', steps.download_toolkit.outputs.toolkit_filename) || '❌ `(Download Failed)`' }}
            - **Ccache Speedup**: ${{ inputs.use_ccache && '✅' || '❌' }}
          files: |
            release_zips/*.zip
            release_zips/*.apk
          prerelease: ${{ inputs.release_type == 'pre-release' }}
