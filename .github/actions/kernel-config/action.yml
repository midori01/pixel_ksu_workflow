name: 'Inject Kernel Configs'
description: 'Applies standard networking, performance, and KSU flags'
inputs:
  defconfig_path:
    description: 'Path to the defconfig file'
    required: true
  build_config_path:
    description: 'Path to the build.config.gki file'
    required: true
  variant:
    description: 'KSU variant (MidoriSU, MidoriXX, or MidoriRE)'
    required: true
  hook_mode:
    description: 'Hook mode (MidoriXX)'
    required: false
    default: 'hybridized'
  enable_susfs:
    description: 'Set to "true" to inject SuSFS configs'
    required: false
    default: 'false'
  use_droidspaces:
    description: 'Set to "true" to inject Droidspaces configs'
    required: false
    default: 'false'
  localversion:
    description: 'Kernel Localversion String'
    required: true

runs:
  using: "composite"
  steps:
    - name: Apply Configurations
      shell: bash
      run: |
        DEFCONFIG="${{ inputs.defconfig_path }}"
        
        sed -i '/CONFIG_LOCALVERSION/d' $DEFCONFIG
        echo "CONFIG_LOCALVERSION=\"${{ inputs.localversion }}\"" >> $DEFCONFIG
        
        cat >> $DEFCONFIG <<-'EOF'
        CONFIG_CC_OPTIMIZE_FOR_PERFORMANCE=y
        CONFIG_LOG_BUF_SHIFT=21
        CONFIG_TMPFS_XATTR=y
        CONFIG_TMPFS_POSIX_ACL=y
        CONFIG_IP_NF_TARGET_TTL=y
        CONFIG_IP6_NF_TARGET_HL=y
        CONFIG_IP6_NF_MATCH_HL=y
        CONFIG_TCP_CONG_ADVANCED=y
        CONFIG_TCP_CONG_BBR=y
        CONFIG_IP_SET=y
        CONFIG_NETFILTER_XT_SET=y
        CONFIG_IP_SET_MAX=65534
        CONFIG_IP_SET_BITMAP_IP=y
        CONFIG_IP_SET_BITMAP_IPMAC=y
        CONFIG_IP_SET_BITMAP_PORT=y
        CONFIG_IP_SET_HASH_IP=y
        CONFIG_IP_SET_HASH_IPMARK=y
        CONFIG_IP_SET_HASH_IPPORT=y
        CONFIG_IP_SET_HASH_IPPORTIP=y
        CONFIG_IP_SET_HASH_IPPORTNET=y
        CONFIG_IP_SET_HASH_IPMAC=y
        CONFIG_IP_SET_HASH_MAC=y
        CONFIG_IP_SET_HASH_NETPORTNET=y
        CONFIG_IP_SET_HASH_NET=y
        CONFIG_IP_SET_HASH_NETNET=y
        CONFIG_IP_SET_HASH_NETPORT=y
        CONFIG_IP_SET_HASH_NETIFACE=y
        CONFIG_IP_SET_LIST_SET=y
        CONFIG_NETFILTER_XT_TARGET_REDIRECT=y
        CONFIG_NETFILTER_XT_TARGET_REJECT=y
        CONFIG_NETFILTER_XT_MATCH_ADDRTYPE=y
        CONFIG_NETFILTER_XT_MATCH_RECENT=y
        CONFIG_NETFILTER_XT_MARK=y
        CONFIG_NETFILTER_XT_CONNMARK=y
        CONFIG_IP6_NF_NAT=y
        CONFIG_IP6_NF_TARGET_REDIRECT=y
        EOF
        
        case "${{ inputs.variant }}" in
          MidoriXX)
            if [ "${{ inputs.hook_mode }}" = "hookless" ]; then
              cat >> $DEFCONFIG <<-'EOF'
        CONFIG_KSU_HACK_ARM64_BRANCH_LINK=y
        EOF
            else
              cat >> $DEFCONFIG <<-'EOF'
        # CONFIG_KSU_KPROBES_KSUD is not set
        EOF
            fi
            ;;
          MidoriRE)
            if [ "${{ inputs.enable_susfs }}" = "true" ]; then
              cat >> $DEFCONFIG <<-'EOF'
        CONFIG_KSU_TOOLKIT_SUPPORT=y
        CONFIG_KSU_SUSFS=y
        # CONFIG_KSU_MANUAL_HOOK is not set
        # CONFIG_KSU_TRACEPOINT_HOOK is not set
        EOF
            else
              cat >> $DEFCONFIG <<-'EOF'
        CONFIG_KSU_TOOLKIT_SUPPORT=y
        CONFIG_KSU_MANUAL_HOOK=y
        # CONFIG_KSU_SUSFS is not set
        # CONFIG_KSU_TRACEPOINT_HOOK is not set
        # CONFIG_KSU_MANUAL_HOOK_AUTO_SETUID_HOOK is not set
        # CONFIG_KSU_MANUAL_HOOK_AUTO_INITRC_HOOK is not set
        EOF
            fi
            ;;
        esac
        
        if [ "${{ inputs.use_droidspaces }}" = "true" ]; then
          cat >> $DEFCONFIG <<-'EOF'
        CONFIG_SYSVIPC=y
        CONFIG_POSIX_MQUEUE=y
        CONFIG_IPC_NS=y
        CONFIG_PID_NS=y
        CONFIG_DEVTMPFS=y
        EOF
        fi
        
        sed -i 's/check_defconfig//' "${{ inputs.build_config_path }}" || true
